<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文字加密解密工具 - 邮箱伪装版</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 30px 15px;
      font-family: "Microsoft YaHei", Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #111827;
    }

    .container {
      margin: 0 auto;
      background: #fff;
      border-radius: 18px;
      padding: 26px;
      box-shadow: 0 20px 55px rgba(0,0,0,0.35);
    }

    h1 {
      text-align: center;
      margin: 0 0 10px;
      font-size: 30px;
    }

    .desc {
      text-align: center;
      color: #6b7280;
      line-height: 1.8;
      margin-bottom: 24px;
     display: none;
    }

    label {
      display: block;
      margin: 16px 0 8px;
      font-weight: 700;
      color: #111827;
    }

    textarea, input {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 12px;
      font-size: 15px;
      outline: none;
      transition: 0.2s;
    }

    textarea {
      min-height: 145px;
      resize: vertical;
      line-height: 1.7;
    }

    input:focus, textarea:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.16);
    }

    .btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 22px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 15px;
      cursor: pointer;
      color: #fff;
      transition: 0.2s;
    }

    button:hover {
      transform: translateY(-1px);
      opacity: 0.92;
    }

    .btn-encrypt { background: #2563eb; }
    .btn-decrypt { background: #16a34a; }
    .btn-copy { background: #7c3aed; }
    .btn-fill { background: #f59e0b; }
    .btn-clear { background: #dc2626; }

    .status {
      display: none;
      margin-top: 18px;
      padding: 12px;
      border-radius: 10px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .status.success {
      display: block;
      background: #dcfce7;
      color: #166534;
    }

    .status.error {
      display: block;
      background: #fee2e2;
      color: #991b1b;
    }

    .tips {
      margin-top: 24px;
      background: #f3f4f6;
      border-left: 4px solid #2563eb;
      padding: 15px;
      border-radius: 8px;
      line-height: 1.8;
      color: #374151;
      font-size: 14px;
display: none;
    }

    .tips code {
      background: #e5e7eb;
      padding: 2px 5px;
      border-radius: 4px;
    }

    @media (max-width: 600px) {
      .container { padding: 18px; }
      h1 { font-size: 24px; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>文字加密解密工具</h1>

    <div class="desc">
      邮箱伪装版：用户名格式为 <b>3位字母 + 9位数字</b>。<br>
      数字中随机分布信息位，外观更接近正常邮箱。
    </div>

    <label for="inputText">输入内容</label>
    <textarea id="inputText" placeholder="加密时输入原文；解密时输入完整邮箱串"></textarea>

    <label for="secretKey">自定义密钥</label>
    <input id="secretKey" type="text" placeholder="请输入自定义密钥，明文显示" />

    <div class="btn-group">
      <button class="btn-encrypt" onclick="encryptText()">加密并生成邮箱串</button>
      <button class="btn-decrypt" onclick="decryptText()">解密</button>
      <button class="btn-copy" onclick="copyResult()">复制结果</button>
      <button class="btn-fill" onclick="fillResultToInput()">结果填回输入框</button>
      <button class="btn-clear" onclick="clearAll()">清空</button>
    </div>

    <label for="resultText">输出结果</label>
    <textarea id="resultText" readonly placeholder="这里显示加密后的邮箱伪装串，或解密后的原文"></textarea>

    <div id="status" class="status"></div>

    <div class="tips">
      <strong>说明：</strong><br>
      1. 每个邮箱用户名固定为 <code>3位字母 + 9位数字</code>。<br>
      2. 每 1 个数字承载 1 bit。<br>
      3. <code>0 bit</code> → 随机偶数 <code>0/2/4/6/8</code>。<br>
      4. <code>1 bit</code> → 随机奇数 <code>1/3/5/7/9</code>。<br>
      5. 多个邮箱之间用 <code>;</code> 分隔，解密时请保留完整格式。
    </div>
  </div>

  <script>
    const textEncoder = new TextEncoder();
    const textDecoder = new TextDecoder();
    const PBKDF2_ITERATIONS = 200000;
    const DOMAINS = ["gmail.com", "outlook.com", "qq.com", "163.com", "yahoo.com"];
    const BITS_PER_EMAIL = 9;

    function showStatus(message, type = "success") {
      const status = document.getElementById("status");
      status.textContent = message;
      status.className = "status " + type;
    }

    function clearStatus() {
      const status = document.getElementById("status");
      status.textContent = "";
      status.className = "status";
    }

    function concatBytes(...arrays) {
      let total = 0;
      for (const arr of arrays) total += arr.length;
      const result = new Uint8Array(total);
      let offset = 0;
      for (const arr of arrays) {
        result.set(arr, offset);
        offset += arr.length;
      }
      return result;
    }

    async function deriveKey(password, salt) {
      const passwordKey = await crypto.subtle.importKey(
        "raw",
        textEncoder.encode(password),
        { name: "PBKDF2" },
        false,
        ["deriveKey"]
      );

      return await crypto.subtle.deriveKey(
        {
          name: "PBKDF2",
          salt,
          iterations: PBKDF2_ITERATIONS,
          hash: "SHA-256"
        },
        passwordKey,
        {
          name: "AES-GCM",
          length: 256
        },
        false,
        ["encrypt", "decrypt"]
      );
    }

    function bytesToBits(bytes) {
      let bits = "";
      for (const byte of bytes) {
        for (let i = 7; i >= 0; i--) {
          bits += ((byte >> i) & 1) ? "1" : "0";
        }
      }
      return bits;
    }

    function bitsToBytes(bits) {
      if (bits.length % 8 !== 0) {
        throw new Error("比特长度不是 8 的倍数。");
      }
      const bytes = new Uint8Array(bits.length / 8);
      for (let i = 0; i < bytes.length; i++) {
        let value = 0;
        for (let j = 0; j < 8; j++) {
          value = (value << 1) | (bits[i * 8 + j] === "1" ? 1 : 0);
        }
        bytes[i] = value;
      }
      return bytes;
    }

    function intToBytes32(n) {
      const b = new Uint8Array(4);
      b[0] = (n >>> 24) & 255;
      b[1] = (n >>> 16) & 255;
      b[2] = (n >>> 8) & 255;
      b[3] = n & 255;
      return b;
    }

    function bytesToInt32(bytes) {
      if (bytes.length < 4) throw new Error("长度头不足 4 字节。");
      return ((bytes[0] << 24) >>> 0) | (bytes[1] << 16) | (bytes[2] << 8) | bytes[3];
    }

    function randomLetter() {
      const letters = "abcdefghijklmnopqrstuvwxyz";
      return letters[Math.floor(Math.random() * letters.length)];
    }

    function randomEvenDigit() {
      return String([0, 2, 4, 6, 8][Math.floor(Math.random() * 5)]);
    }

    function randomOddDigit() {
      return String([1, 3, 5, 7, 9][Math.floor(Math.random() * 5)]);
    }

    function randomDomain() {
      return DOMAINS[Math.floor(Math.random() * DOMAINS.length)];
    }

    function encodeBitsAsEmails(bits) {
      const bitLenHeader = intToBytes32(bits.length);
      const payloadBits = bytesToBits(bitLenHeader) + bits;

      const paddedBits = payloadBits.padEnd(
        Math.ceil(payloadBits.length / BITS_PER_EMAIL) * BITS_PER_EMAIL,
        "0"
      );

      const emails = [];

      for (let i = 0; i < paddedBits.length; i += BITS_PER_EMAIL) {
        const chunk = paddedBits.slice(i, i + BITS_PER_EMAIL);

        let local = "";
        local += randomLetter();
        local += randomLetter();
        local += randomLetter();

        for (let j = 0; j < chunk.length; j++) {
          if (chunk[j] === "0") {
            local += randomEvenDigit();
          } else {
            local += randomOddDigit();
          }
        }

        const domain = randomDomain();
        emails.push(`${local}@${domain}`);
      }

      return emails.join(";");
    }

    function decodeEmailsToBits(text) {
      const emails = text.split(";").map(s => s.trim()).filter(Boolean);
      if (emails.length === 0) throw new Error("没有检测到邮箱数据。");

      let bits = "";

      for (const email of emails) {
        const atIndex = email.indexOf("@");
        if (atIndex === -1) throw new Error("邮箱格式错误，缺少 @。");

        const local = email.slice(0, atIndex);
        const digits = local.match(/\d/g);
        if (!digits || digits.length !== 9) {
          throw new Error("邮箱用户名数字长度不正确，必须是 9 位数字。");
        }

        for (const d of digits) {
          if (["0", "2", "4", "6", "8"].includes(d)) {
            bits += "0";
          } else if (["1", "3", "5", "7", "9"].includes(d)) {
            bits += "1";
          } else {
            throw new Error("邮箱数据中包含非法数字。");
          }
        }
      }

      return bits;
    }

    async function encryptText() {
      clearStatus();
      try {
        if (!window.crypto || !crypto.subtle) {
          showStatus("当前浏览器不支持 Web Crypto API。", "error");
          return;
        }

        const plainText = document.getElementById("inputText").value;
        const password = document.getElementById("secretKey").value;

        if (!plainText) return showStatus("请输入需要加密的原文。", "error");
        if (!password) return showStatus("请输入自定义密钥。", "error");

        const salt = crypto.getRandomValues(new Uint8Array(16));
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const aesKey = await deriveKey(password, salt);

        const encryptedBuffer = await crypto.subtle.encrypt(
          { name: "AES-GCM", iv },
          aesKey,
          textEncoder.encode(plainText)
        );

        const encryptedBytes = new Uint8Array(encryptedBuffer);
        const packed = concatBytes(salt, iv, encryptedBytes);

        const bits = bytesToBits(packed);
        const disguised = encodeBitsAsEmails(bits);

        document.getElementById("resultText").value = disguised;
        showStatus("加密成功。已生成邮箱伪装串。", "success");
      } catch (error) {
        console.error(error);
        showStatus("加密失败：" + error.message, "error");
      }
    }

    async function decryptText() {
      clearStatus();
      try {
        if (!window.crypto || !crypto.subtle) {
          showStatus("当前浏览器不支持 Web Crypto API。", "error");
          return;
        }

        const text = document.getElementById("inputText").value;
        const password = document.getElementById("secretKey").value;

        if (!text) return showStatus("请输入完整的邮箱伪装串。", "error");
        if (!password) return showStatus("请输入自定义密钥。", "error");

        const allBits = decodeEmailsToBits(text);

        if (allBits.length < 32) {
          return showStatus("数据太短，无法读取长度头。", "error");
        }

        const headerBits = allBits.slice(0, 32);
        const headerBytes = bitsToBytes(headerBits);
        const payloadBitLen = bytesToInt32(headerBytes);

        const totalNeeded = 32 + payloadBitLen;
        if (allBits.length < totalNeeded) {
          return showStatus("邮箱数据不完整，实际比特数不足。", "error");
        }

        const payloadBits = allBits.slice(32, totalNeeded);
        const packed = bitsToBytes(payloadBits);

        if (packed.length < 16 + 12 + 16) {
          return showStatus("密文长度不正确，可能格式损坏。", "error");
        }

        const salt = packed.slice(0, 16);
        const iv = packed.slice(16, 28);
        const cipherBytes = packed.slice(28);

        const aesKey = await deriveKey(password, salt);

        const decryptedBuffer = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv },
          aesKey,
          cipherBytes
        );

        const plainText = textDecoder.decode(decryptedBuffer);
        document.getElementById("resultText").value = plainText;
        showStatus("解密成功。", "success");
      } catch (error) {
        console.error(error);
        showStatus("解密失败：密钥错误、邮箱格式损坏，或数据不完整。", "error");
      }
    }

    async function copyResult() {
      clearStatus();
      const result = document.getElementById("resultText").value;
      if (!result) return showStatus("没有可复制的内容。", "error");
      try {
        await navigator.clipboard.writeText(result);
        showStatus("结果已复制到剪贴板。", "success");
      } catch (error) {
        const resultText = document.getElementById("resultText");
        resultText.select();
        document.execCommand("copy");
        showStatus("结果已复制。", "success");
      }
    }

    function fillResultToInput() {
      clearStatus();
      const result = document.getElementById("resultText").value;
      if (!result) return showStatus("输出结果为空。", "error");
      document.getElementById("inputText").value = result;
      showStatus("已将输出结果填入输入框。", "success");
    }

    function clearAll() {
      document.getElementById("inputText").value = "";
      document.getElementById("secretKey").value = "";
      document.getElementById("resultText").value = "";
      clearStatus();
    }
  </script>
</body>
</html>
